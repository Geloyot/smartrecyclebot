version: "3.8"

services:
  app:
    build:
      context: .  # Current directory (smartrecyclebot)
      dockerfile: Dockerfile.dev
    container_name: smartrecyclebot-app
    volumes:
      - .:/var/www
      - ./.env:/var/www/.env:ro
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=recyclebot
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - PYTHON_SERVICE_URL=http://python:8001
    depends_on:
      - db
      - python
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    ports:
      - "8000:8000"
      - "5173:5173"
    networks:
      - smartrecyclebot-network
    tty: true
    stdin_open: true

  python:
    build:
      context: ../smartrecyclebot-python  # Go up one level, then into python folder
      dockerfile: Dockerfile
    container_name: smartrecyclebot-python
    volumes:
      - ../smartrecyclebot-python:/app
    ports:
      - "8001:8001"
    environment:
      - MODEL_PATH=/app/models/best.pt
      - LARAVEL_URL=http://app:8000
      - API_KEY=local-dev-secret-key
    networks:
      - smartrecyclebot-network

  db:
    image: mysql:8.0
    container_name: smartrecyclebot-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: recyclebot
      MYSQL_USER: recyclebot_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - smartrecyclebot-network

  redis:
    image: redis:alpine
    container_name: smartrecyclebot-redis
    ports:
      - "6379:6379"
    networks:
      - smartrecyclebot-network

networks:
  smartrecyclebot-network:
    driver: bridge

volumes:
  db-data:
    driver: local
